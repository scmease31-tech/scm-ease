/* ═══ REBUILD DISPATCH ═══ */
function rebuild(){
  clearScene();
  if(cur==='compare'){buildCmp();return}
  if(viewMode==='packed') buildPacked(cur);
  else if(viewMode==='packing') buildPacking(cur);
  else if(viewMode==='details') buildDetails(cur);
  else buildLayers(cur);
}
function clearScene(){
  if(grp){scene.remove(grp);grp.traverse(ch=>{
    if(ch.geometry)ch.geometry.dispose();
    if(ch.material){(Array.isArray(ch.material)?ch.material:[ch.material]).forEach(m=>m.dispose())}});}
  grp=null;meshes=[];_hovered=null;
  dims.forEach(d=>{if(d.element&&d.element.parentNode)d.element.parentNode.removeChild(d.element);scene.remove(d)});
  dims=[];
}

/* ═══════════════════════════════════════════════
   PACKED VIEW — real proportional sizes
   ═══════════════════════════════════════════════ */
function buildPacked(k){
  const d=D[k];
  const cnt=parseInt(d.pack[0].cnt); // 31 or 36
  const W=d.mW*SC, H=d.mH*SC;       // actual module W & H scaled
  const mTh=d.frameTh*SC;            // real frame thickness: 35→0.233 or 30→0.2
  const palletHmm=132, palletH=palletHmm*SC; // real 132mm pallet
  const baseGap=2*SC; // ~2mm real gap
  const spread=unpacked?ex*.6:ex*.15;
  const mGap=baseGap+spread;
  const totalZ=cnt*mTh+(cnt-1)*mGap;
  const isPerc=d.tag==='m10';
  const isG12=d.tag==='g12r';

  // Parse real box dimensions from data
  const boxDim=d.pack[1].dim;
  const bd=boxDim.match(/(\d+)/g);
  const boxLmm=+bd[0], boxWmm=+bd[1], boxHmm=+bd[2];
  // Parse real pallet dimensions
  const palDim=d.pack[0].dim;
  const pd=palDim.match(/(\d+)/g);
  const palLmm=+pd[pd.length-3], palWmm=+pd[pd.length-2];

  grp=new THREE.Group();
  const palletTop=palletH/2;

  // ── PALLET (real proportions) ──
  const plW=palLmm*SC, plD=palWmm*SC;
  const wood=new THREE.MeshPhysicalMaterial({color:0x8d6e63,roughness:.8});
  const dkWood=new THREE.MeshPhysicalMaterial({color:0x5d4037,roughness:.85});
  for(let i=0;i<7;i++){
    const p=new THREE.Mesh(new THREE.BoxGeometry(plW,.06,plD/8),wood);
    p.position.set(0,palletTop,-plD/2+plD/14+i*plD/7);p.castShadow=true;grp.add(p)}
  for(let i=0;i<3;i++){
    const p=new THREE.Mesh(new THREE.BoxGeometry(plW,.06,plD/10),wood);
    p.position.set(0,-palletTop+.03,-plD/3+i*plD/3);p.castShadow=true;grp.add(p)}
  for(let x=-1;x<=1;x++){for(let z=-1;z<=1;z++){
    const bl=new THREE.Mesh(new THREE.BoxGeometry(plW*.12,palletH-.12,plD*.08),dkWood);
    bl.position.set(x*plW*.35,0,z*plD*.3);bl.castShadow=true;grp.add(bl)}}

  // ── STANDING MODULES (real thickness) ──
  const frameClr=isG12?0xc68a50:0x78909c;
  const cellClr=new THREE.Color(d.clr);
  const fMat=new THREE.MeshPhysicalMaterial({color:frameClr,metalness:.8,roughness:.15});
  const cMat=new THREE.MeshPhysicalMaterial({color:cellClr,roughness:.06,metalness:.55,clearcoat:.4});
  const backClr=isPerc?0xe8eaf6:cellClr.clone();
  const bMat=new THREE.MeshPhysicalMaterial({color:backClr,roughness:isPerc?.5:.1,metalness:isPerc?0:.4});
  const glassFront=new THREE.MeshPhysicalMaterial({color:0x004d40,transparent:true,opacity:.18,roughness:.02,clearcoat:1,side:THREE.DoubleSide});

  const mGeo=new THREE.BoxGeometry(W,H,mTh);
  const mMats=[fMat,fMat,fMat,fMat,cMat,bMat];

  for(let i=0;i<cnt;i++){
    const z=-totalZ/2+i*(mTh+mGap)+mTh/2;
    const mod=new THREE.Mesh(mGeo,mMats);
    mod.position.set(0,palletTop+.04+H/2,z);
    mod.castShadow=true;mod.receiveShadow=true;
    mod.userData={layer:{n:d.nm+' #'+(i+1),dim:d.mW+'×'+d.mH+'×'+d.frameTh+'mm'}};
    grp.add(mod);meshes.push(mod);
    const gl=new THREE.Mesh(new THREE.PlaneGeometry(W*.97,H*.97),glassFront);
    gl.position.set(0,palletTop+.04+H/2,z+mTh/2+.002);
    grp.add(gl);
    const edges=new THREE.LineSegments(new THREE.EdgesGeometry(mGeo),
      new THREE.LineBasicMaterial({color:frameClr,transparent:true,opacity:.35}));
    edges.position.copy(mod.position);grp.add(edges);
  }

  // ── BOX (real proportions, hide when unpacked) ──
  if(!unpacked){
    const bW=boxLmm*SC, bH=boxHmm*SC, bD=boxWmm*SC;
    const boxMat=new THREE.MeshPhysicalMaterial({color:0xa1887f,roughness:.7,transparent:true,opacity:.4,side:THREE.DoubleSide});
    const boxEdge=new THREE.LineBasicMaterial({color:0x5d4037,transparent:true,opacity:.7});
    const boxY=palletTop+bH/2;
    [{g:[bW,bH],p:[0,boxY,bD/2],r:[0,0,0]},{g:[bW,bH],p:[0,boxY,-bD/2],r:[0,Math.PI,0]},
     {g:[bD,bH],p:[bW/2,boxY,0],r:[0,Math.PI/2,0]},{g:[bD,bH],p:[-bW/2,boxY,0],r:[0,-Math.PI/2,0]},
     {g:[bW,bD],p:[0,palletTop+bH,0],r:[-Math.PI/2,0,0]}
    ].forEach(f=>{const m=new THREE.Mesh(new THREE.PlaneGeometry(...f.g),boxMat);
      m.position.set(...f.p);m.rotation.set(...f.r);grp.add(m)});
    const bwire=new THREE.LineSegments(new THREE.EdgesGeometry(new THREE.BoxGeometry(bW,bH,bD)),boxEdge);
    bwire.position.set(0,boxY,0);grp.add(bwire);

    // PET STRAPS
    const strapMat=new THREE.MeshBasicMaterial({color:0x1565c0});
    const sw=16*SC;
    [-1,1].forEach(s=>{
      const sz=s*bD*.2;
      const ht=new THREE.Mesh(new THREE.BoxGeometry(bW+.08,sw,sw),strapMat);
      ht.position.set(0,palletTop+bH+.01,sz);grp.add(ht);
      const hb=new THREE.Mesh(new THREE.BoxGeometry(bW+.08,sw,sw),strapMat);
      hb.position.set(0,palletTop-.01,sz);grp.add(hb);
      const vl=new THREE.Mesh(new THREE.BoxGeometry(sw,bH+.05,sw),strapMat);
      vl.position.set(-bW/2-.01,boxY,sz);grp.add(vl);
      const vr=new THREE.Mesh(new THREE.BoxGeometry(sw,bH+.05,sw),strapMat);
      vr.position.set(bW/2+.01,boxY,sz);grp.add(vr);
    });

    // PLASTIC CORNERS — between PET straps and pallet edges (strap protection)
    const pcDim=d.pack[4].dim.match(/(\d+)/g); // "35×35mm"
    const pcS=(+pcDim[0])*SC;
    const pcMat=new THREE.MeshPhysicalMaterial({color:0x546e7a,metalness:.1,roughness:.25});
    [-1,1].forEach(sx=>{[-1,1].forEach(sz=>{
      const strapZ=sz*bD*.2;
      // At pallet level where strap wraps under
      const pc=new THREE.Mesh(new THREE.BoxGeometry(pcS,pcS,pcS),pcMat);
      pc.position.set(sx*(bW/2),palletTop-.01,strapZ);grp.add(pc);
      // At top where strap wraps over
      const pct=new THREE.Mesh(new THREE.BoxGeometry(pcS,pcS,pcS),pcMat);
      pct.position.set(sx*(bW/2),palletTop+bH+.01,strapZ);grp.add(pct);
    })});

    // CORRUGATED CORNERS — L-shaped cushions inside box corners
    const ccDim=d.pack[3].dim.match(/(\d+)/g); // "35×18mm"
    const ccW=(+ccDim[0])*SC, ccD=(+ccDim[1])*SC;
    const ccMat=new THREE.MeshPhysicalMaterial({color:0xbcaaa4,roughness:.75});
    [[1,1],[-1,1],[1,-1],[-1,-1]].forEach(([sx,sz])=>{
      const cv=new THREE.Mesh(new THREE.BoxGeometry(ccW,bH*.85,ccD),ccMat);
      cv.position.set(sx*(bW/2-ccW/2),boxY,sz*(bD/2-ccD/2));grp.add(cv);
      const ch2=new THREE.Mesh(new THREE.BoxGeometry(ccD,bH*.85,ccW),ccMat);
      ch2.position.set(sx*(bW/2-ccD/2),boxY,sz*(bD/2-ccW/2));grp.add(ch2)});

    // RETAINER STRIPS — vertical spacers between modules for safe unloading
    const retDim=d.pack[2].dim.match(/[\d.]+/g); // "1261.5×36.5mm"
    const retL=(+retDim[0])*SC, retW=(+retDim[1])*SC;
    const retMat=new THREE.MeshPhysicalMaterial({color:0xd7ccc8,roughness:.6,transparent:true,opacity:.75});
    // Place 2 retainer strips evenly spaced in the module stack
    const retPositions=[Math.floor(cnt/3),Math.floor(2*cnt/3)];
    retPositions.forEach(ri=>{
      const rz=-totalZ/2+ri*(mTh+mGap)+mTh+mGap*.3;
      const ret=new THREE.Mesh(new THREE.BoxGeometry(retW,retL,mGap*.4),retMat);
      ret.position.set(0,palletTop+.04+retL/2,rz);
      ret.add(new THREE.LineSegments(new THREE.EdgesGeometry(ret.geometry),
        new THREE.LineBasicMaterial({color:0xa1887f,transparent:true,opacity:.5})));
      grp.add(ret);
    });

    // STRETCH FILM
    const filmMat=new THREE.MeshPhysicalMaterial({color:0xddd,transparent:true,opacity:.04,side:THREE.DoubleSide,roughness:.05});
    const fw=bW+.1,fd=bD+.1,fh=bH+.15;
    [{g:[fw,fh],p:[0,boxY,fd/2],r:[0,0,0]},{g:[fw,fh],p:[0,boxY,-fd/2],r:[0,0,0]},
     {g:[fd,fh],p:[fw/2,boxY,0],r:[0,Math.PI/2,0]},{g:[fd,fh],p:[-fw/2,boxY,0],r:[0,Math.PI/2,0]}
    ].forEach(f=>{const m=new THREE.Mesh(new THREE.PlaneGeometry(...f.g),filmMat);
      m.position.set(...f.p);m.rotation.set(...f.r);grp.add(m)});
  }

  // ── DIMENSION LABELS — mkLbl style with leader lines ──
  if(showLabels){
    // Name badge
    const nl=mkLbl(d.nm+' '+cnt+'-in-1',d.mW+'×'+d.mH+'×'+d.frameTh+'mm',d.clr2);
    nl.position.set(0,palletTop+H+.4,0);grp.add(nl);dims.push(nl);
    // Length — along X axis, positioned on back face edge
    const ll=mkLbl('Length',d.mW+' mm',d.clr2);
    ll.position.set(0,palletTop+H+.15,-totalZ/2-mTh*2);grp.add(ll);dims.push(ll);
    // Height — along Y axis, positioned on left back edge
    const hl=mkLbl('Height',d.mH+' mm','#c62828');
    hl.position.set(-W/2-mTh*4,palletTop+H/2,-totalZ/2-mTh*2);grp.add(hl);dims.push(hl);
    // Thickness — front of stack
    const tl=mkLbl('Thickness',d.frameTh+'mm × '+cnt+' pcs','#37474f');
    tl.position.set(W/3,palletTop+H*.3,totalZ/2+mTh*2);grp.add(tl);dims.push(tl);
    // Pallet
    const pl=mkLbl('🪵 Pallet',palLmm+'×'+palWmm+'×'+palletHmm+'mm','#5d4037');
    pl.position.set(W/3,0,0);grp.add(pl);dims.push(pl);
    // Stack depth
    const stackMm=Math.round(cnt*d.frameTh+(cnt-1)*2);
    const sl=mkLbl('Stack Depth','~'+stackMm+' mm','#455a64');
    sl.position.set(-W/3,palletTop+.1,totalZ/2+mTh*2);grp.add(sl);dims.push(sl);
    // Box + packing labels when packed
    if(!unpacked){
      const bH=boxHmm*SC;
      const bl=mkLbl('📦 Box',boxLmm+'×'+boxWmm+'×'+boxHmm+'mm','#5d4037');
      bl.position.set(W/2+mTh*4,palletTop+bH+.1,0);grp.add(bl);dims.push(bl);
    }
  }

  // Center
  const bb=new THREE.Box3().setFromObject(grp);
  const cn=bb.getCenter(new THREE.Vector3());
  grp.position.set(-cn.x,-cn.y,-cn.z);
  scene.add(grp);
}

/* ═══════════════════════════════════════════════
   LAYERS VIEW — exploded single module
   ═══════════════════════════════════════════════ */
function buildLayers(k){
  const d=D[k];
  if(!compVis[k]){compVis[k]={};d.layers.forEach(l=>compVis[k][l.id]=true);d.pack.forEach(p=>compVis[k][p.id]=true)}
  const vis=compVis[k];
  grp=new THREE.Group();
  const W=d.mW*SC,H=d.mH*SC;
  let y=0;const gap=2.0;

  d.layers.forEach((L,i)=>{
    let th=L.thV||(.12);
    if(L.t==='frame')th=.4;else if(L.t==='jbox')th=.35;else if(L.t==='bsheet')th=.06;
    let m;
    if(L.t==='frame')m=mkFrame(W,H,th,L,d);
    else if(L.t==='cell')m=mkCells(W*.92,H*.92,th,d);
    else if(L.t==='jbox')m=mkJBox();
    else if(L.t==='bsheet')m=mkBacksheet(W*.96,H*.96,th);
    else if(L.t==='glass')m=mkGlass(W*.96,th,H*.96,L,d);
    else if(L.t==='enc')m=mkEnc(W*.95,th,H*.95,L);
    else m=mkSlab(W*.96,th,H*.96,L.c,L.o);
    let rW=d.mW,rH=d.mH,w3d=W*.96,h3d=H*.96;
    if(L.t==='frame'){rW=d.mW+2*d.frameW;rH=d.mH+2*d.frameW;w3d=W;h3d=H}
    else if(L.t==='cell'){rW=Math.round(d.cr*d.cH);rH=Math.round(d.cc*d.cW);w3d=W*.92;h3d=H*.92}
    else if(L.t==='jbox'){rW=150;rH=100;w3d=.8;h3d=.5}
    else if(L.t==='enc'){const em=L.dim.match(/(\d+)[×x](\d+)/);if(em){rW=+em[1];rH=+em[2]}w3d=W*.95;h3d=H*.95}
    const _pct=((rW*rH)/(d.mW*d.mH)*100).toFixed(1);
    const _lc='#'+L.c.toString(16).padStart(6,'0');
    m.userData={idx:i,baseY:y,gap:i*gap,layer:L,
      detailInfo:{rW,rH,pct:_pct,lc:_lc,name:L.n,cons:L.cons,dim:L.dim,w3d,h3d}};
    m.position.y=y+i*gap*ex;
    m.visible=vis[L.id]!==false;
    m.castShadow=true;m.receiveShadow=true;
    grp.add(m);meshes.push(m);
    if(showLabels&&m.visible){
      const s=i%2===0?1:-1;
      const dl=mkLbl(L.n,L.dim,d.clr2,s);
      dl.position.set(s*(W/2+2.5),m.position.y,0);grp.add(dl);dims.push(dl);
      grp.add(mkLeader(s*(W/2+.05),m.position.y,0,s*(W/2+2),m.position.y,0,d.clr2))}
    y+=th+.02;
  });

  // Type badge
  if(showLabels){
    const el=document.createElement('div');el.style.cssText='pointer-events:none;text-align:center';
    let u='';
    if(d.tag==='m10r')u='✓ Standard Topcon · Glass-Glass';
    else if(d.tag==='g12r')u='⬌ 104mm WIDER · Slim frame · 36/pallet';
    else u='◻ Glass-Backsheet · 3.2mm glass · EVA · PERC';
    el.innerHTML=`<div style="background:rgba(255,255,255,.95);border:1px solid ${d.clr2}44;border-radius:9px;padding:7px 13px;
      box-shadow:0 2px 10px rgba(0,0,0,.1)">
      <div style="font-size:12px;font-weight:800;color:${d.clr2}">${d.nm}</div>
      <div style="font-size:9px;color:#607d8b;margin-top:2px">${d.mW}×${d.mH}mm · ${d.st}</div>
      <div style="font-size:8px;color:${d.clr2};margin-top:2px">${u}</div></div>`;
    const lo=new THREE.CSS2DObject(el);
    lo.position.set(0,d.layers.length*2*ex+2.2,-H/2-1.5);grp.add(lo);dims.push(lo);

    // Cell info
    const ce=document.createElement('div');ce.style.cssText='pointer-events:none';
    ce.innerHTML=`<div style="background:rgba(255,255,255,.95);border:1px solid ${d.clr2}33;border-radius:7px;padding:5px 9px;text-align:center;
      box-shadow:0 1px 6px rgba(0,0,0,.07)">
      <div style="font-size:9px;font-weight:700;color:${d.clr2}">⚡ ${d.cW}×${d.cH}mm</div>
      <div style="font-size:8px;color:#607d8b">${d.ct} · ${d.cc}×${d.cr}=${d.cn} · Ø${d.rDia}</div></div>`;
    const co=new THREE.CSS2DObject(ce);
    co.position.set(-W/2-3,meshes[3]?.position.y||3,0);grp.add(co);dims.push(co);
  }
  const bb=new THREE.Box3().setFromObject(grp);
  const cn=bb.getCenter(new THREE.Vector3());
  grp.position.set(-cn.x,-cn.y,-cn.z);scene.add(grp);
}

/* ═══ PACKING VIEW — same exploded-layer style as MODULE ═══ */
function buildPacking(k){
  const d=D[k];
  if(!compVis[k]){compVis[k]={};d.layers.forEach(l=>compVis[k][l.id]=true);d.pack.forEach(p=>compVis[k][p.id]=true)}
  const vis=compVis[k];
  grp=new THREE.Group();
  const cnt=parseInt(d.pack[0].cnt);
  const W=d.mW*SC,H=d.mH*SC;
  const bd=d.pack[1].dim.match(/(\d+)/g);
  const boxLmm=+bd[0],boxWmm=+bd[1],boxHmm=+bd[2];
  const pd=d.pack[0].dim.match(/(\d+)/g);
  const palLmm=+pd[pd.length-3],palWmm=+pd[pd.length-2],palHmm=+pd[pd.length-1];

  // Define packing layers bottom→top, each with shape builder
  const pkLayers=[
    {pk:d.pack[0],id:'pallet',n:'🪵 Wooden Pallet',w:palLmm,h:palWmm,th:.35,
      c:0x8d6e63,o:.9,build:(w,h,th)=>{
        const g=new THREE.Group();
        const wd=new THREE.MeshPhysicalMaterial({color:0x8d6e63,roughness:.8});
        const dk=new THREE.MeshPhysicalMaterial({color:0x5d4037,roughness:.85});
        // Top planks
        for(let i=0;i<7;i++){const p=new THREE.Mesh(new THREE.BoxGeometry(w,.04,h/8),wd);
          p.position.set(0,th/4,-h/2+h/14+i*h/7);g.add(p)}
        // Bottom planks
        for(let i=0;i<3;i++){const p=new THREE.Mesh(new THREE.BoxGeometry(w,.04,h/10),wd);
          p.position.set(0,-th/4,-h/3+i*h/3);g.add(p)}
        // Blocks
        for(let x=-1;x<=1;x++){for(let z=-1;z<=1;z++){
          const bl=new THREE.Mesh(new THREE.BoxGeometry(w*.12,th*.7,h*.08),dk);
          bl.position.set(x*w*.35,0,z*h*.3);g.add(bl)}}
        return g;
      }},
    {pk:d.pack[2],id:'retainer',n:'📏 Retainer Strips',w:0,h:0,th:.12,
      c:0xd7ccc8,o:.85,build:(w,h,th)=>{
        const g=new THREE.Group();
        const mat=new THREE.MeshPhysicalMaterial({color:0xd7ccc8,roughness:.6,transparent:true,opacity:.85});
        const rd=d.pack[2].dim.match(/[\d.]+/g);
        const rL=(+rd[0])*SC,rW=(+rd[1])*SC;
        [-1,1].forEach(s=>{const r=new THREE.Mesh(new THREE.BoxGeometry(rW,th,rL),mat);
          r.position.set(s*W*.25,0,0);
          r.add(new THREE.LineSegments(new THREE.EdgesGeometry(r.geometry),
            new THREE.LineBasicMaterial({color:0xa1887f,transparent:true,opacity:.5})));
          g.add(r)});
        return g;
      }},
    {pk:d.pack[3],id:'ccorner',n:'📐 Corrugated Corners',w:0,h:0,th:.15,
      c:0xbcaaa4,o:.8,build:(w,h,th)=>{
        const g=new THREE.Group();
        const mat=new THREE.MeshPhysicalMaterial({color:0xbcaaa4,roughness:.75});
        const cd=d.pack[3].dim.match(/(\d+)/g);
        const cW=(+cd[0])*SC*3,cD=(+cd[1])*SC*3;
        [[1,1],[-1,1],[1,-1],[-1,-1]].forEach(([sx,sz])=>{
          const v=new THREE.Mesh(new THREE.BoxGeometry(cW,th,cD),mat);
          v.position.set(sx*W*.4,0,sz*H*.35);g.add(v);
          const hz=new THREE.Mesh(new THREE.BoxGeometry(cD,th,cW),mat);
          hz.position.set(sx*W*.4,0,sz*H*.35);g.add(hz)});
        g.children.forEach(c=>c.add(new THREE.LineSegments(new THREE.EdgesGeometry(c.geometry),
          new THREE.LineBasicMaterial({color:0x8d6e63,transparent:true,opacity:.4}))));
        return g;
      }},
    {pk:d.pack[4],id:'pcorner',n:'🔲 Plastic Corners',w:0,h:0,th:.12,
      c:0x546e7a,o:.9,build:(w,h,th)=>{
        const g=new THREE.Group();
        const mat=new THREE.MeshPhysicalMaterial({color:0x455a64,metalness:.35,roughness:.12,clearcoat:.3});
        const pcd=d.pack[4].dim.match(/(\d+)/g);
        const ps=(+pcd[0])*SC*2.5;
        [[1,1],[-1,1],[1,-1],[-1,-1]].forEach(([sx,sz])=>{
          const pc=new THREE.Mesh(new THREE.BoxGeometry(ps,th,ps),mat);
          pc.position.set(sx*W*.42,0,sz*H*.15);g.add(pc)});
        g.children.forEach(c=>c.add(new THREE.LineSegments(new THREE.EdgesGeometry(c.geometry),
          new THREE.LineBasicMaterial({color:0x37474f,transparent:true,opacity:.3}))));
        return g;
      }},
    {pk:d.pack[5],id:'strap',n:'🔗 PET Straps',w:0,h:0,th:.06,
      c:0x1565c0,o:.95,build:(w,h,th)=>{
        const g=new THREE.Group();
        const mat=new THREE.MeshPhysicalMaterial({color:0x1976d2,metalness:.3,roughness:.15,clearcoat:.5});
        // Two horizontal bands
        [-1,1].forEach(s=>{
          const band=new THREE.Mesh(new THREE.BoxGeometry(W*1.05,th,16*SC*2),mat);
          band.position.set(0,0,s*H*.18);g.add(band)});
        return g;
      }},
    {pk:d.pack[1],id:'box',n:'📦 Corrugated Box',w:boxLmm,h:boxWmm,th:.2,
      c:0xa1887f,o:.55,build:(w,h,th)=>{
        const bx=new THREE.Mesh(new THREE.BoxGeometry(w,th,h),
          new THREE.MeshPhysicalMaterial({color:0xc4a882,roughness:.55,transparent:true,opacity:.8,side:THREE.DoubleSide}));
        bx.add(new THREE.LineSegments(new THREE.EdgesGeometry(bx.geometry),
          new THREE.LineBasicMaterial({color:0x5d4037,transparent:true,opacity:.6})));
        return bx;
      }},
    {pk:d.pack[6],id:'film',n:'🎞 Stretch Film',w:boxLmm,h:boxWmm,th:.03,
      c:0x90caf9,o:.12,build:(w,h,th)=>{
        const fm=new THREE.Mesh(new THREE.BoxGeometry(w*1.02,th,h*1.02),
          new THREE.MeshPhysicalMaterial({color:0x90caf9,transparent:true,opacity:.12,side:THREE.DoubleSide,roughness:.05}));
        fm.add(new THREE.LineSegments(new THREE.EdgesGeometry(fm.geometry),
          new THREE.LineBasicMaterial({color:0x90caf9,transparent:true,opacity:.25})));
        return fm;
      }},
  ];

  let y=0;const gap=2.0;
  pkLayers.forEach((L,i)=>{
    if(vis[L.id]===false)return;
    const sw=L.w?L.w*SC:W;
    const sh=L.h?L.h*SC:H;
    const m=L.build(sw,sh,L.th);
    const pkd=L.pk.dim.match(/[\d.]+/g);
    const _rW=pkd?Math.round(+pkd[0]):d.mW,_rH=pkd&&pkd[1]?Math.round(+pkd[1]):d.mH;
    const _lc2='#'+L.c.toString(16).padStart(6,'0');
    m.userData={idx:i,baseY:y,gap:i*gap,layer:L,
      detailInfo:{rW:_rW,rH:_rH,pct:'—',lc:_lc2,name:L.n,cons:L.pk.cons,dim:L.pk.dim,w3d:sw,h3d:sh}};
    m.position.y=y+i*gap*ex;
    m.castShadow=true;m.receiveShadow=true;
    grp.add(m);meshes.push(m);
    if(showLabels){
      const cc='#'+L.c.toString(16).padStart(6,'0');
      const s=i%2===0?1:-1;
      const dl=mkLbl(L.n,L.pk.dim+' · '+L.pk.cons,cc,s);
      dl.position.set(s*(W/2+2.5),m.position.y,0);grp.add(dl);dims.push(dl);
      grp.add(mkLeader(s*(W/2+.05),m.position.y,0,s*(W/2+2),m.position.y,0,cc))}
    y+=L.th+.02;
  });

  // Title badge
  if(showLabels){
    const el=document.createElement('div');el.style.cssText='pointer-events:none;text-align:center';
    el.innerHTML=`<div style="background:rgba(255,255,255,.95);border:1px solid ${d.clr2}44;border-radius:9px;padding:7px 13px;
      box-shadow:0 2px 10px rgba(0,0,0,.1)">
      <div style="font-size:12px;font-weight:800;color:#5d4037">📦 Packing — ${d.nm}</div>
      <div style="font-size:9px;color:#607d8b;margin-top:2px">${cnt} modules/pallet · ${d.pack.length} components</div></div>`;
    const lo=new THREE.CSS2DObject(el);
    lo.position.set(0,pkLayers.length*2*ex+2.2,-H/2-1.5);grp.add(lo);dims.push(lo);
  }
  const bb=new THREE.Box3().setFromObject(grp);
  const cn=bb.getCenter(new THREE.Vector3());
  grp.position.set(-cn.x,-cn.y,-cn.z);scene.add(grp);
}

/* ═══ DETAILS VIEW — proportional stacked layers, hover to reveal ═══ */
function buildDetails(k){
  const d=D[k];
  grp=new THREE.Group();
  const modW=d.mW, modH=d.mH;

  const items=d.layers.map(L=>{
    let rW=modW, rH=modH;
    if(L.t==='frame'){ rW=modW+2*d.frameW; rH=modH+2*d.frameW; }
    else if(L.t==='cell'){ rW=Math.round(d.cr*d.cH); rH=Math.round(d.cc*d.cW); }
    else if(L.t==='jbox'){ rW=150; rH=100; }
    else if(L.t==='enc'){
      const em=L.dim.match(/(\d+)[×x](\d+)/);
      if(em){ rW=+em[1]; rH=+em[2]; }
    }
    return {L, rW, rH};
  });

  let y=0;
  const gap=2.0;

  items.forEach((it,i)=>{
    const L=it.L;
    const w=it.rW*SC, h=it.rH*SC;
    let th=L.thV||.12;
    if(L.t==='frame')th=.4;
    else if(L.t==='jbox')th=.35;
    else if(L.t==='bsheet')th=.06;

    let m;
    if(L.t==='frame') m=mkFrame(w,h,th,L,d);
    else if(L.t==='cell'){
      const cd={cc:d.cr, cr:d.cc, tag:d.tag, clr:d.clr};
      m=mkCells(w,h,th,cd);
    }
    else if(L.t==='jbox') m=mkJBox();
    else if(L.t==='bsheet') m=mkBacksheet(w,h,th);
    else if(L.t==='glass') m=mkGlass(w,th,h,L,d);
    else if(L.t==='enc') m=mkEnc(w,th,h,L);
    else m=mkSlab(w,th,h,L.c,L.o);

    const pct=((it.rW*it.rH)/(modW*modH)*100).toFixed(1);
    const lc='#'+L.c.toString(16).padStart(6,'0');
    m.userData={idx:i, baseY:y, gap:i*gap, layer:L,
      detailInfo:{rW:it.rW, rH:it.rH, pct, lc, name:L.n, cons:L.cons, dim:L.dim, w3d:w, h3d:h}};
    m.position.y=y+i*gap*ex;
    m.castShadow=true; m.receiveShadow=true;
    grp.add(m); meshes.push(m);
    y+=th+.02;
  });

  const bb=new THREE.Box3().setFromObject(grp);
  const cn=bb.getCenter(new THREE.Vector3());
  grp.position.set(-cn.x,-cn.y,-cn.z);scene.add(grp);
}

/* ═══ SHAPE BUILDERS (layers view) ═══ */
function mkGlass(w,h,d,L,data){
  const mat=new THREE.MeshPhysicalMaterial({color:L.c,transparent:true,opacity:.55,roughness:.05,metalness:.05,clearcoat:1,side:THREE.DoubleSide});
  const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),mat);
  m.add(new THREE.LineSegments(new THREE.EdgesGeometry(m.geometry),new THREE.LineBasicMaterial({color:0x004d40,transparent:true,opacity:.5})));
  if(data.tag==='m10'&&L.id==='fglass'){
    const inner=new THREE.Mesh(new THREE.PlaneGeometry(w*.9,d*.9),new THREE.MeshPhysicalMaterial({color:0x4db6ac,transparent:true,opacity:.15,side:THREE.DoubleSide}));
    inner.rotation.x=Math.PI/2;inner.position.y=-h*.25;m.add(inner)}
  return m;
}
function mkEnc(w,h,d,L){
  const isEVA=L.id&&L.id.startsWith('eva');
  const mat=new THREE.MeshPhysicalMaterial({color:L.c,transparent:true,opacity:.72,roughness:isEVA?.5:.25,side:THREE.DoubleSide});
  const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),mat);
  m.add(new THREE.LineSegments(new THREE.EdgesGeometry(m.geometry),new THREE.LineBasicMaterial({color:isEVA?0x2e7d32:0xf9a825,transparent:true,opacity:.45})));
  if(isEVA){const dm=new THREE.MeshBasicMaterial({color:0x1b5e20,transparent:true,opacity:.3});
    for(let i=-3;i<=3;i++){const dot=new THREE.Mesh(new THREE.PlaneGeometry(.12,.12),dm);
      dot.position.set(i*w*.12,h/2+.003,0);dot.rotation.x=-Math.PI/2;m.add(dot)}}
  return m;
}
function mkBacksheet(w,d,th){
  const m=new THREE.Mesh(new THREE.BoxGeometry(w,th,d),new THREE.MeshPhysicalMaterial({color:0xeceff1,roughness:.45}));
  m.add(new THREE.LineSegments(new THREE.EdgesGeometry(m.geometry),new THREE.LineBasicMaterial({color:0x546e7a,transparent:true,opacity:.6})));
  const hm=new THREE.MeshBasicMaterial({color:0x78909c,transparent:true,opacity:.2});
  for(let i=-4;i<=4;i++){const l=new THREE.Mesh(new THREE.PlaneGeometry(.02,d*.7),hm);
    l.position.set(i*w*.1,th/2+.002,0);l.rotation.x=-Math.PI/2;l.rotation.z=Math.PI/4;m.add(l)}
  return m;
}
function mkFrame(w,h,th,L,data){
  const g=new THREE.Group(),isG=data.tag==='g12r',fw=isG?.13:.2;
  const mat=new THREE.MeshPhysicalMaterial({color:L.c,metalness:.82,roughness:.15,transparent:true,opacity:L.o});
  [{s:[w+fw*2,th,fw],p:[0,0,h/2+fw/2]},{s:[w+fw*2,th,fw],p:[0,0,-(h/2+fw/2)]},
   {s:[fw,th,h],p:[-(w/2+fw/2),0,0]},{s:[fw,th,h],p:[w/2+fw/2,0,0]}].forEach(b=>{
    const bar=new THREE.Mesh(new THREE.BoxGeometry(...b.s),mat);bar.position.set(...b.p);bar.castShadow=true;
    bar.add(new THREE.LineSegments(new THREE.EdgesGeometry(bar.geometry),new THREE.LineBasicMaterial({color:0x37474f,transparent:true,opacity:.12})));
    g.add(bar)});
  const cm=new THREE.MeshPhysicalMaterial({color:isG?0xd4944a:0x90a4ae,metalness:.85,roughness:.12});
  [[1,1],[-1,1],[1,-1],[-1,-1]].forEach(([sx,sz])=>{
    const c=new THREE.Mesh(new THREE.CylinderGeometry(fw*.5,fw*.5,th,10),cm);
    c.position.set(sx*(w/2+fw/2),0,sz*(h/2+fw/2));g.add(c)});
  if(isG){const sm=new THREE.MeshBasicMaterial({color:0xe65100,transparent:true,opacity:.25});
    [-1,1].forEach(s=>{const st=new THREE.Mesh(new THREE.BoxGeometry(w*.4,.005,fw*.2),sm);
      st.position.set(0,th/2+.002,s*(h/2+fw/2));g.add(st)})}
  return g;
}
function mkCells(w,h,th,data){
  const g=new THREE.Group(),{cc:cols,cr:rows}=data,gp=.04;
  const cw=(w-gp*(cols+1))/cols,ch=(h-gp*(rows+1))/rows;
  const isP=data.tag==='m10',bbN=isP?3:5;
  const cMat=new THREE.MeshPhysicalMaterial({color:new THREE.Color(data.clr),roughness:.06,metalness:.55,clearcoat:.4});
  const bbMat=new THREE.MeshBasicMaterial({color:isP?0x999:0xccc});
  for(let r=0;r<rows;r++){for(let c=0;c<cols;c++){
    const cell=new THREE.Mesh(new THREE.BoxGeometry(cw,th,ch),cMat);
    cell.position.set(-w/2+gp+cw/2+c*(cw+gp),0,-h/2+gp+ch/2+r*(ch+gp));cell.castShadow=true;g.add(cell);
    for(let b=1;b<=bbN;b++){const bb=new THREE.Mesh(new THREE.BoxGeometry(cw*.8,th*1.05,.004),bbMat);
      bb.position.set(cell.position.x,th/2+.001,cell.position.z-ch/2+ch/(bbN+1)*b);g.add(bb)}}}
  const rm=new THREE.MeshBasicMaterial({color:0xaaa,transparent:true,opacity:.45});
  for(let c=0;c<cols-1;c++){const rb=new THREE.Mesh(new THREE.BoxGeometry(gp*1.5,th*.4,h*.8),rm);
    rb.position.x=-w/2+gp+cw+c*(cw+gp)+gp/2;g.add(rb)}
  if(isP){const pm=new THREE.MeshBasicMaterial({color:0x9c27b0,transparent:true,opacity:.12});

function mkLeader(x1,y1,z1,x2,y2,z2,c){
  const g=new THREE.Group();const cc=new THREE.Color(c);
  const pts=[new THREE.Vector3(x1,y1,z1),new THREE.Vector3(x2,y2,z2)];
  const geo=new THREE.BufferGeometry().setFromPoints(pts);
  g.add(new THREE.Line(geo,new THREE.LineBasicMaterial({color:cc,transparent:true,opacity:.5})));
  const dot=new THREE.Mesh(new THREE.SphereGeometry(.06,10,10),
    new THREE.MeshBasicMaterial({color:cc,transparent:true,opacity:.8}));
  dot.position.set(x1,y1,z1);g.add(dot);
  const dir=new THREE.Vector3(x1-x2,y1-y2,z1-z2).normalize();
  const cone=new THREE.Mesh(new THREE.ConeGeometry(.055,.16,6),
    new THREE.MeshBasicMaterial({color:cc,transparent:true,opacity:.65}));
  cone.position.set(x1-dir.x*.08,y1-dir.y*.08,z1-dir.z*.08);
  cone.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0),dir);
  g.add(cone);
  return g;
}

/* ═══ COMPARE — visually distinct side-by-side ═══ */
function buildCmp(){
  grp=new THREE.Group();
  const keys=['m10r','g12r','m10'];
  const baseW=2272; // reference width for relative sizing
  const cmpSC=1/180; // slightly smaller scale for compare

  keys.forEach((k,ti)=>{
    const d=D[k],sg=new THREE.Group();
    const W=d.mW*cmpSC, H=d.mH*cmpSC;
    const fTh=d.frameTh*cmpSC;
    const cnt=parseInt(d.pack[0].cnt);
    let y=0;const gap=1.0;

    // Build layers with real proportional sizes
    d.layers.forEach((L,i)=>{
      let th=L.thV?L.thV*.6:L.t==='frame'?fTh:L.t==='jbox'?.2:L.t==='cell'?.08:.06;
      let m;
      if(L.t==='frame')m=mkFrame(W,H,th,L,d);
      else if(L.t==='cell')m=mkCells(W*.92,H*.92,th,d);
      else if(L.t==='jbox')m=mkJBox();
      else if(L.t==='bsheet')m=mkBacksheet(W*.96,H*.96,th);
      else if(L.t==='glass')m=mkGlass(W*.96,th,H*.96,L,d);
      else if(L.t==='enc')m=mkEnc(W*.95,th,H*.95,L);
      else m=mkSlab(W*.96,th,H*.96,L.c,L.o);
      m.userData={idx:i,baseY:y,gap:i*gap};m.position.y=y+i*gap*ex;sg.add(m);meshes.push(m);y+=th+.02});

    // Colored base platform to distinguish each module
    const platMat=new THREE.MeshPhysicalMaterial({color:new THREE.Color(d.clr),transparent:true,opacity:.12,roughness:.8});
    const plat=new THREE.Mesh(new THREE.BoxGeometry(W*1.15,.06,H*1.15),platMat);
    plat.position.y=-.15;sg.add(plat);
    const platEdge=new THREE.LineSegments(new THREE.EdgesGeometry(plat.geometry),
      new THREE.LineBasicMaterial({color:new THREE.Color(d.clr2),transparent:true,opacity:.4}));
    platEdge.position.copy(plat.position);sg.add(platEdge);

    // Labels for each module
    if(showLabels){
      // Title
      const te=document.createElement('div');te.style.cssText='pointer-events:none;text-align:center';
      te.innerHTML=`<div style="background:rgba(255,255,255,.92);border:2px solid ${d.clr2};border-radius:6px;padding:3px 10px">
        <div style="font-size:10px;font-weight:800;color:${d.clr2}">${d.nm}</div>
        <div style="font-size:8px;color:#607d8b;font-weight:600">${d.st}</div></div>`;
      const tlo=new THREE.CSS2DObject(te);tlo.position.y=-1.2;sg.add(tlo);dims.push(tlo);

      // Size callout
      const se=document.createElement('div');se.style.cssText='pointer-events:none;text-align:center';
      se.innerHTML=`<div style="font-size:7.5px;font-weight:700;color:${d.clr2}">◄ ${d.mW}mm ►</div>`;
      const slo=new THREE.CSS2DObject(se);slo.position.set(0,y+d.layers.length*gap*ex+.3,0);sg.add(slo);dims.push(slo);

      // Key specs column
      const isGG=d.st==='Glass-Glass';
      const specs=[
        `${d.mW}×${d.mH}mm`,
        `${d.cn}× ${d.ct}`,
        `${d.cW}×${d.cH}mm cells`,
        `${isGG?'Glass-Glass':'Glass-BS'}`,
        `Frame ${d.frameTh}mm`,
        `${cnt}/pallet`,
        `Ribbon Ø${d.rDia}`
      ];
      const ke=document.createElement('div');ke.style.cssText='pointer-events:none';
      ke.innerHTML=`<div style="background:rgba(255,255,255,.9);border-left:3px solid ${d.clr2};border-radius:3px;padding:3px 6px;font-size:6.5px;line-height:1.6;color:#37474f">
        ${specs.map(s=>`<div>${s}</div>`).join('')}</div>`;
      const klo=new THREE.CSS2DObject(ke);klo.position.set(W/2+.8,(y+d.layers.length*gap*ex)/2,0);sg.add(klo);dims.push(klo);

      // Highlight unique features
      let uniq='';
      if(k==='m10r')uniq='Standard reference';
      else if(k==='g12r')uniq='⚡ Widest · 36/pallet · Slim frame';
      else uniq='⚠ Backsheet · EVA · Thick glass';
      const ue=document.createElement('div');ue.style.cssText='pointer-events:none;text-align:center';
      ue.innerHTML=`<div style="background:${d.clr2}18;border:1px solid ${d.clr2}44;border-radius:4px;padding:2px 6px;font-size:7px;font-weight:600;color:${d.clr2}">${uniq}</div>`;
      const ulo=new THREE.CSS2DObject(ue);ulo.position.y=-1.8;sg.add(ulo);dims.push(ulo);
    }

    // Space modules proportionally with actual width differences visible
    const xSpacing=14;
    sg.position.x=(ti-1)*xSpacing;
    const bb=new THREE.Box3().setFromObject(sg);sg.position.y=-bb.getCenter(new THREE.Vector3()).y;
    grp.add(sg)});

  // Difference connector lines between modules
  if(showLabels){
    const lineMat=new THREE.LineBasicMaterial({color:0x90a4ae,transparent:true,opacity:.3});
    // Width diff line between M10R and G12R
    const diffMm=D.g12r.mW-D.m10r.mW;
    const de=document.createElement('div');de.style.cssText='pointer-events:none;text-align:center';
    de.innerHTML=`<div style="font-size:7px;font-weight:700;color:#ef6c00">+${diffMm}mm wider</div>`;
    const dlo=new THREE.CSS2DObject(de);dlo.position.set(-7,6,0);grp.add(dlo);dims.push(dlo);

    // Pack count comparison
    const pe=document.createElement('div');pe.style.cssText='pointer-events:none;text-align:center';
    pe.innerHTML=`<div style="background:rgba(255,255,255,.9);border-radius:5px;padding:3px 8px;font-size:7.5px;color:#37474f;line-height:1.7">
      <div style="font-weight:700;color:#00838f;font-size:8px;margin-bottom:2px">📦 Pack Comparison</div>
      <div><span style="color:#2e7d32;font-weight:700">M10R</span> ${D.m10r.pack[0].cnt}/pal</div>
      <div><span style="color:#ef6c00;font-weight:700">G12R</span> ${D.g12r.pack[0].cnt}/pal</div>
      <div><span style="color:#7b1fa2;font-weight:700">M10</span> ${D.m10.pack[0].cnt}/pal</div></div>`;
    const plo=new THREE.CSS2DObject(pe);plo.position.set(0,-5,0);grp.add(plo);dims.push(plo);
  }

  scene.add(grp);
}

function panelDetails(p){

      <div style="font-size:7.5px;color:#607d8b;padding:2px 0">Perimeter ${(framePerim/1e3).toFixed(1)}m × ${d.frameW}mm wide × ${d.frameH}mm high</div>

    <div style="margin-top:4px">

  const totalTh=d.tag==='m10'?(3.2+0.65+0.35+0.55+0.365):(2+0.48+0.35+0.48+2);
  h+=`<div style="margin-top:4px;font-size:8px;font-weight:700;color:#37474f">Total laminate: ~${totalTh.toFixed(1)}mm → inside ${d.frameH}mm frame</div>`;

  // ── PACKING AREA ──
  h+=`<div class="acc open"><div class="acc-h" onclick="togA(this)">
    <div class="acc-ic" style="background:#5d403718;color:#5d4037">📦</div>
    <div class="acc-t">Packing Dimensions</div><div class="acc-ar">▼</div></div>
    <div class="acc-b"><div class="acc-in">
    <div class="r"><span class="l">Pallet Footprint</span><span class="v">${palA.toFixed(3)} m²</span></div>
    ${bar(palA/modA*100,'#5d4037')}
    <div style="font-size:7.5px;color:#607d8b;padding:2px 0">${d.pack[0].dim}</div>
    <div class="r"><span class="l">Box Surface Area</span><span class="v">${boxSA.toFixed(2)} m²</span></div>
    <div class="r"><span class="l">Box Volume</span><span class="v">${boxVol.toFixed(3)} m³</span></div>
    <div style="font-size:7.5px;color:#607d8b;padding:2px 0">${d.pack[1].dim}</div>
    <div class="r"><span class="l">Modules/Pallet</span><span class="v" style="font-size:12px;color:${d.clr2}">${cnt}</span></div>
    <div class="r"><span class="l">Total Module Area/Pal</span><span class="v" style="font-weight:800">${(modA*cnt).toFixed(1)} m²</span></div>
    <div class="r"><span class="l">Stack Depth</span><span class="v">${cnt*d.frameTh+(cnt-1)*2}mm</span></div>
    <div class="r"><span class="l">Pallet vs Module</span><span class="v">+${((palA/modA-1)*100).toFixed(1)}% overhang</span></div>
    <div class="r"><span class="l">Box vs Module</span><span class="v">+${(((+bd[0])*(+bd[1])/(d.mW*d.mH)-1)*100).toFixed(1)}% clearance</span></div>
    </div></div></div>`;

  // ── WHY EACH LAYER EXISTS ──
  h+=`<div class="acc open"><div class="acc-h" onclick="togA(this)">
    <div class="acc-ic" style="background:#ef6c0018;color:#ef6c00">❓</div>
    <div class="acc-t">Why Each Layer?</div><div class="acc-ar">▼</div></div>
    <div class="acc-b"><div class="acc-in" style="font-size:8px;line-height:1.8;color:#37474f">
    <div style="padding:2px 0;border-bottom:1px solid #f0f0f0"><b style="color:#78909c">🖼 Frame</b> — structural support, mounting rails attach here. ${d.tag==='g12r'?'30mm slim = less aluminium, lighter':'35mm standard depth'}</div>
    <div style="padding:2px 0;border-bottom:1px solid #f0f0f0"><b style="color:#00838f">🔲 Front Glass</b> — transmits light to cells, protects from hail/weather. ${d.tag==='m10'?'3.2mm tempered (thicker because no back glass support)':'2mm with ARC coating for max transmission'}</div>
    <div style="padding:2px 0;border-bottom:1px solid #f0f0f0"><b style="color:#f9a825">🧪 ${d.tag==='m10'?'EVA':'EPE'}</b> — bonds glass to cells, provides electrical insulation. ${d.tag==='m10'?'EVA is cheaper but yellows over time':'EPE has better UV stability, premium choice'}</div>
    <div style="padding:2px 0;border-bottom:1px solid #f0f0f0"><b style="color:${d.clr2}">⚡ Cells</b> — converts photons to electricity. ${d.cn}× ${d.ct} @ ${d.cW}×${d.cH}mm. ${d.tag==='g12r'?'Taller cells (210mm) = fewer interconnects, higher throughput':'Standard 182mm wafer'}</div>

function panelCmp(p){
  const mods=[['m10r',D.m10r],['g12r',D.g12r],['m10',D.m10]];
  const fs=8; // base font size
  let h=`<div class="side-hdr"><h2 style="color:#00838f">⟷ Compare All 3</h2>
    <div class="sub">MATHEMATICAL SIZE ANALYSIS</div></div><div class="side-body">`;

  // Calculated metrics
  const metrics=mods.map(([k,d])=>{
    const mA=d.mW*d.mH/1e6; // module area m²
    const cA=d.cW*d.cH*d.cn/1e6; // total cell area m²
    const eff=(cA/mA*100).toFixed(1); // cell fill ratio %
    const cnt=+d.pack[0].cnt;
    const palA=mA*cnt; // total area per pallet m²
    const fVol=2*(d.mW+d.mH)*d.frameTh*d.frameH; // frame perimeter volume mm³
    const stackD=cnt*d.frameTh+(cnt-1)*2; // stack depth mm
    const bd=d.pack[1].dim.match(/(\d+)/g);
    const boxVol=(+bd[0])*(+bd[1])*(+bd[2])/1e9; // box volume m³
    return {mA,cA,eff,cnt,palA,fVol,stackD,boxVol,
      cellAr:(d.cW/d.cH).toFixed(2),modAr:(d.mW/d.mH).toFixed(2)};
  });

  // Mini bar chart helper
  const bar=(val,max,clr)=>{
    const pct=Math.round(val/max*100);
    return `<div style="width:100%;height:6px;background:#eceff1;border-radius:3px;margin-top:2px">
      <div style="width:${pct}%;height:6px;background:${clr};border-radius:3px"></div></div>`;
  };

  // Header row for tables
  const hdr=mods.map(([k,d])=>`<th style="padding:2px 4px;color:${d.clr2};font-size:7px;font-weight:700">${d.nm.split(' ')[0]}</th>`).join('');

  // ── AREA MATHEMATICS ──
  h+=`<div class="acc open"><div class="acc-h" onclick="togA(this)">
    <div class="acc-ic" style="background:#1565c018;color:#1565c0">📐</div>
    <div class="acc-t">Area Mathematics</div><div class="acc-ar">▼</div></div>
    <div class="acc-b"><div class="acc-in">`;
  const maxMA=Math.max(...metrics.map(m=>m.mA));
  const maxCA=Math.max(...metrics.map(m=>m.cA));
  const maxPA=Math.max(...metrics.map(m=>m.palA));
  // Module area
  h+=`<div style="font-size:7.5px;font-weight:700;color:#455a64;margin-bottom:2px">Module Area (W×H)</div>
    <table style="width:100%;font-size:7.5px;border-collapse:collapse"><tr><td></td>${hdr}</tr>`;
  h+=`<tr><td style="color:#90a4ae;padding:1px 4px">W×H</td>`;
  mods.forEach(([k,d])=>h+=`<td style="text-align:center;font-family:Consolas;padding:1px 4px">${d.mW}×${d.mH}</td>`);
  h+=`</tr><tr><td style="color:#90a4ae;padding:1px 4px">Area</td>`;
  metrics.forEach((m,i)=>h+=`<td style="text-align:center;font-weight:700;color:${mods[i][1].clr2};padding:1px 4px">${m.mA.toFixed(3)} m²</td>`);
  h+=`</tr><tr><td></td>`;
  metrics.forEach((m,i)=>h+=`<td style="padding:1px 4px">${bar(m.mA,maxMA,mods[i][1].clr2)}</td>`);
  h+=`</tr></table>`;
  // Delta
  const dAm=(metrics[1].mA-metrics[0].mA).toFixed(3);
  h+=`<div style="font-size:7px;color:#ef6c00;margin:3px 0 6px">△ G12R is <b>+${dAm} m²</b> larger (${((metrics[1].mA/metrics[0].mA-1)*100).toFixed(1)}% more area)</div>`;

  // Cell area & fill ratio
  h+=`<div style="font-size:7.5px;font-weight:700;color:#455a64;margin-bottom:2px">Cell Coverage</div>
    <table style="width:100%;font-size:7.5px;border-collapse:collapse"><tr><td></td>${hdr}</tr>`;
  h+=`<tr><td style="color:#90a4ae;padding:1px 4px">Cells</td>`;
  mods.forEach(([k,d])=>h+=`<td style="text-align:center;padding:1px 4px">${d.cn}× ${d.cW}×${d.cH}</td>`);
  h+=`</tr><tr><td style="color:#90a4ae;padding:1px 4px">Cell Area</td>`;
  metrics.forEach((m,i)=>h+=`<td style="text-align:center;font-weight:700;color:${mods[i][1].clr2};padding:1px 4px">${m.cA.toFixed(3)} m²</td>`);
  h+=`</tr><tr><td style="color:#90a4ae;padding:1px 4px">Fill %</td>`;
  metrics.forEach((m,i)=>{
    const best=Math.max(...metrics.map(x=>+x.eff));
    h+=`<td style="text-align:center;font-weight:700;padding:1px 4px;color:${+m.eff===best?'#2e7d32':'#37474f'}">${m.eff}%${+m.eff===best?' ★':''}</td>`;
  });
  h+=`</tr><tr><td></td>`;
  metrics.forEach((m,i)=>h+=`<td style="padding:1px 4px">${bar(m.cA,maxCA,mods[i][1].clr2)}</td>`);
  h+=`</tr></table>`;
  h+=`</div></div></div>`;

  // ── SIZE DELTAS ──
  h+=`<div class="acc open"><div class="acc-h" onclick="togA(this)">
    <div class="acc-ic" style="background:#ef6c0018;color:#ef6c00">△</div>
    <div class="acc-t">Size Deltas (vs M10R ref)</div><div class="acc-ar">▼</div></div>
    <div class="acc-b"><div class="acc-in">`;
  const ref=D.m10r;
  [['g12r',D.g12r],['m10',D.m10]].forEach(([k,d])=>{
    const dW=d.mW-ref.mW, dH=d.mH-ref.mH, dF=d.frameTh-ref.frameTh;
    const dCW=(d.cW-ref.cW).toFixed(1), dCH=(d.cH-ref.cH);
    const dCnt=+d.pack[0].cnt - +ref.pack[0].cnt;
    h+=`<div style="border-left:3px solid ${d.clr2};padding:3px 6px;margin-bottom:5px;background:#f5f7fa;border-radius:4px">
      <div style="font-size:8.5px;font-weight:700;color:${d.clr2}">${d.nm} vs M10R</div>
      <div style="font-size:7.5px;line-height:1.8;color:#37474f;font-family:Consolas">
        Width: ${dW>0?'+':''}${dW}mm (${ref.mW}→${d.mW})<br>
        Height: ${dH>0?'+':''}${dH}mm (${ref.mH}→${d.mH})<br>
        Frame: ${dF>0?'+':''}${dF}mm (${ref.frameTh}→${d.frameTh}mm)<br>
        Cell: ${dCW>0?'+':''}${dCW}×${dCH>0?'+':''}${dCH}mm<br>
        Pack: ${dCnt>0?'+':''}${dCnt} modules/pal (${ref.pack[0].cnt}→${d.pack[0].cnt})<br>
        Structure: ${ref.st}→<b>${d.st}</b>
      </div></div>`;
  });
  h+=`</div></div></div>`;

  // ── PACKING EFFICIENCY ──
  h+=`<div class="acc open"><div class="acc-h" onclick="togA(this)">
    <div class="acc-ic" style="background:#6d4c4118;color:#6d4c41">📦</div>
    <div class="acc-t">Packing Efficiency</div><div class="acc-ar">▼</div></div>
    <div class="acc-b"><div class="acc-in">`;
  h+=`<table style="width:100%;font-size:7.5px;border-collapse:collapse"><tr><td></td>${hdr}</tr>`;
  h+=`<tr><td style="color:#90a4ae;padding:2px 4px">Modules/pal</td>`;
  metrics.forEach((m,i)=>{
    const best=Math.max(...metrics.map(x=>x.cnt));
    h+=`<td style="text-align:center;font-weight:800;font-size:10px;color:${m.cnt===best?'#2e7d32':mods[i][1].clr2};padding:2px 4px">${m.cnt}${m.cnt===best?' ★':''}</td>`;
  });
  h+=`</tr><tr><td style="color:#90a4ae;padding:2px 4px">Stack depth</td>`;
  metrics.forEach((m,i)=>h+=`<td style="text-align:center;font-family:Consolas;padding:2px 4px">${m.stackD}mm</td>`);
  h+=`</tr><tr><td style="color:#90a4ae;padding:2px 4px">m²/pallet</td>`;
  metrics.forEach((m,i)=>h+=`<td style="text-align:center;font-weight:700;color:${mods[i][1].clr2};padding:2px 4px">${m.palA.toFixed(1)}</td>`);
  h+=`</tr><tr><td></td>`;
  metrics.forEach((m,i)=>h+=`<td style="padding:1px 4px">${bar(m.palA,maxPA,mods[i][1].clr2)}</td>`);
  h+=`</tr><tr><td style="color:#90a4ae;padding:2px 4px">Box vol</td>`;
  metrics.forEach((m,i)=>h+=`<td style="text-align:center;font-family:Consolas;padding:2px 4px">${m.boxVol.toFixed(2)} m³</td>`);
  h+=`</tr></table>`;
  const palBest=metrics.reduce((a,b)=>a.palA>b.palA?a:b);
  const palWorst=metrics.reduce((a,b)=>a.palA<b.palA?a:b);
  h+=`<div style="font-size:7px;color:#2e7d32;margin-top:3px">Best: <b>${palBest.palA.toFixed(1)} m²/pal</b> — ${((palBest.palA/palWorst.palA-1)*100).toFixed(0)}% more than worst</div>`;
  h+=`</div></div></div>`;

  // ── STRUCTURAL DIFFERENCES ──
  h+=`<div class="acc open"><div class="acc-h" onclick="togA(this)">
    <div class="acc-ic" style="background:#ef535018;color:#ef5350">⚡</div>
    <div class="acc-t">Structural Why</div><div class="acc-ar">▼</div></div>
    <div class="acc-b"><div class="acc-in">
    <div style="font-size:8px;line-height:1.9;color:#37474f">
    <div style="padding:3px 0;border-bottom:1px solid #f0f0f0"><b style="color:#ef6c00">G12R wider (+104mm)</b> → taller cells (210mm vs 182mm) = fewer cuts, less ribbon, higher throughput</div>
    <div style="padding:3px 0;border-bottom:1px solid #f0f0f0"><b style="color:#ef6c00">G12R slim frame (30mm)</b> → 5mm thinner per module × 36 = saves 180mm stack depth → fits +5 more modules/pallet</div>
    <div style="padding:3px 0;border-bottom:1px solid #f0f0f0"><b style="color:#ef6c00">G12R 36 vs 31/pal</b> → +16% more modules shipped per truck → lower logistics cost/Wp</div>
    <div style="padding:3px 0;border-bottom:1px solid #f0f0f0"><b style="color:#7b1fa2">M10 Backsheet</b> → lighter, cheaper, but less durable than glass-glass; no bifacial gain</div>
    <div style="padding:3px 0;border-bottom:1px solid #f0f0f0"><b style="color:#7b1fa2">M10 3.2mm glass</b> → 60% thicker = stronger but heavier; needed because single-glass (no back glass support)</div>
    <div style="padding:3px 0"><b style="color:#7b1fa2">M10 EVA</b> → cheaper than EPE but yellows faster; EVA+backsheet = standard PERC BOM, EPE+glass = premium Topcon BOM</div>
    </div></div></div></div>`;

  h+=`</div>`;p.innerHTML=h;
}

/* ═══ CONTROLS ═══ */
function go(k){
  cur=k;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelector(`.tab.t-${k==='compare'?'cmp':k}`).classList.add('active');

    document.getElementById('cS').textContent=d.st.toUpperCase();
    document.getElementById('cC').textContent=d.cn+' CELLS'}
  else{document.getElementById('cS').textContent='ALL';document.getElementById('cC').textContent='COMPARE'}
  renderBar();rebuild();panel();rstC();
}
function setView(mode){
  viewMode=mode;hidePkgPanel();
  if(mode==='packed'){ex=.15;unpacked=false}else{ex=.45}
  renderBar();rebuild();panel();rstC();
}
function togUnpack(){unpacked=!unpacked;if(!unpacked)hidePkgPanel();renderBar();rebuild();panel()}

function hidePkgPanel(){const p=document.getElementById('pkgPanel');if(p)p.remove()}
function setExpl(v){ex=v;rebuild()}
function togR(){ctrl.autoRotate=!ctrl.autoRotate;
  const b=document.getElementById('bR');if(b)b.classList.toggle('on')}
function togLabels(){showLabels=!showLabels;renderBar();rebuild()}
function togA(el){el.parentElement.classList.toggle('open')}
function togComp(model,id,el){

function rstC(){

function togS(){

/* ═══ INTERACTION — hover highlight + click to isolate ═══ */
function onHover(e){
  const now=Date.now();if(now-_hvT<30)return;_hvT=now;
  _mouse.x=(e.clientX/innerWidth)*2-1;
  _mouse.y=-(e.clientY/innerHeight)*2+1;
  raycaster.setFromCamera(_mouse,cam);
  const hits=raycaster.intersectObjects(meshes,true);
  const tt=document.getElementById('tooltip');
  if(hits.length>0){
    let obj=hits[0].object;
    while(obj&&!meshes.includes(obj))obj=obj.parent;
    if(!obj){unHover(tt);return}
    if(_hovered!==obj){
      unHover(tt);_hovered=obj;
      _hovered.traverse(ch=>{if(ch.isMesh&&ch.material){
        const ms=Array.isArray(ch.material)?ch.material:[ch.material];
        ms.forEach(m=>{if(m.emissive){
          if(ch.userData._oe===undefined)ch.userData._oe=m.emissive.getHex();
          m.emissive.setHex(0x444444)}})}});
      // Show edge dimension markers on hover (details always, others when labels off)
      if(obj.userData.detailInfo&&(viewMode==='details'||!showLabels)){
        clearDetDims();
        const di=obj.userData.detailInfo;
        const py=obj.position.y;
        // Width dim line along front edge
        const wEl=document.createElement('div');
        wEl.style.cssText='pointer-events:none;display:flex;align-items:center;gap:0';
        wEl.innerHTML='<div style="width:8px;height:0;border-top:1.5px solid '+di.lc+'"></div>'+
          '<div style="height:12px;border-left:1.5px solid '+di.lc+'"></div>'+
          '<div style="flex:1;height:0;border-top:1px dashed '+di.lc+'44;min-width:6px"></div>'+
          '<div style="font-size:10px;font-weight:800;color:'+di.lc+';padding:2px 8px;background:rgba(255,252,247,.92);border-radius:8px;border:1px solid '+di.lc+'20;white-space:nowrap;backdrop-filter:blur(10px)">'+di.rW+' mm</div>'+
          '<div style="flex:1;height:0;border-top:1px dashed '+di.lc+'44;min-width:6px"></div>'+
          '<div style="height:12px;border-right:1.5px solid '+di.lc+'"></div>'+
          '<div style="width:8px;height:0;border-top:1.5px solid '+di.lc+'"></div>';
        const wLo=new THREE.CSS2DObject(wEl);
        wLo.position.set(0,py,-di.h3d/2-.5);
        grp.add(wLo);_detDims.push(wLo);
        // Height dim line along left edge
        const hEl=document.createElement('div');
        hEl.style.cssText='pointer-events:none;display:flex;flex-direction:column;align-items:center';
        hEl.innerHTML='<div style="width:0;height:6px;border-left:1.5px solid '+di.lc+'"></div>'+
          '<div style="height:12px;border-top:1.5px solid '+di.lc+';width:0"></div>'+
          '<div style="font-size:10px;font-weight:800;color:'+di.lc+';padding:2px 8px;background:rgba(255,252,247,.92);border-radius:8px;border:1px solid '+di.lc+'20;white-space:nowrap;backdrop-filter:blur(10px);writing-mode:vertical-lr">'+di.rH+' mm</div>'+
          '<div style="height:12px;border-bottom:1.5px solid '+di.lc+';width:0"></div>'+
          '<div style="width:0;height:6px;border-left:1.5px solid '+di.lc+'"></div>';
        const hLo=new THREE.CSS2DObject(hEl);
        hLo.position.set(-di.w3d/2-.8,py,0);
        grp.add(hLo);_detDims.push(hLo);
        // Name + info badge on right side
        const nEl=document.createElement('div');
        nEl.style.cssText='pointer-events:none';
        nEl.innerHTML='<div style="background:rgba(255,252,247,.94);backdrop-filter:blur(20px);border-radius:12px;padding:8px 14px;border:1px solid '+di.lc+'20;border-left:3px solid '+di.lc+';box-shadow:0 4px 20px rgba(0,0,0,.06)">'+
          '<div style="font-size:11px;font-weight:800;color:'+di.lc+';letter-spacing:.3px">'+di.name+'</div>'+
          '<div style="font-size:13px;font-weight:900;color:#1a1a2e;margin:2px 0;letter-spacing:-.3px">'+di.rW+' × '+di.rH+' <span style="font-size:9px;color:#8b7355">mm</span></div>'+
          '<div style="display:flex;gap:6px;margin-top:3px"><span style="font-size:8px;font-weight:700;color:#2d6a4f;background:rgba(45,106,79,.08);padding:1px 7px;border-radius:8px">'+di.pct+'%</span><span style="font-size:8px;color:#8b7355">'+di.cons+'</span></div></div>';
        const nLo=new THREE.CSS2DObject(nEl);
        nLo.position.set(di.w3d/2+1.5,py,0);
        grp.add(nLo);_detDims.push(nLo);
      }
    }
    const ud=obj.userData,ly=ud.layer;
    if(ly){
      const tc=layerClr(ly);
      if(ud.detailInfo&&(viewMode==='details'||!showLabels)){
        tt.innerHTML='<div class="tt-name" style="color:'+tc+'">'+(ly.n||'Part')+'</div><div class="tt-dim">'+ud.detailInfo.rW+'×'+ud.detailInfo.rH+'mm · '+ud.detailInfo.dim+'</div><div class="tt-hint">Click to '+(ud._clicked?'restore':'hide')+'</div>';
      }else{
        tt.innerHTML='<div class="tt-name" style="color:'+tc+'">'+(ly.n||'Part')+'</div><div class="tt-dim">'+(ly.dim||ly.pk?.dim||'')+'</div><div class="tt-hint">Click to '+(ud._clicked?'restore':'hide')+'</div>';
      }
      tt.style.borderLeftColor=tc;
    }else{
      tt.innerHTML='<div class="tt-name">Component</div><div class="tt-hint">Click to '+(ud._clicked?'restore':'hide')+'</div>';
      tt.style.borderLeftColor='#1565c0';
    }
    tt.style.display='block';
    tt.style.left=Math.min(e.clientX+15,innerWidth-240)+'px';
    tt.style.top=Math.min(e.clientY-10,innerHeight-80)+'px';
    ren.domElement.style.cursor='pointer';
  }else{unHover(tt)}
}
function clearDetDims(){
  _detDims.forEach(d=>{if(d.element&&d.element.parentNode)d.element.parentNode.removeChild(d.element);if(grp)grp.remove(d)});
  _detDims=[];
}
function unHover(tt){
  if(_hovered){
    _hovered.traverse(ch=>{if(ch.isMesh&&ch.material){
      const ms=Array.isArray(ch.material)?ch.material:[ch.material];
      ms.forEach(m=>{if(m.emissive&&ch.userData._oe!==undefined)m.emissive.setHex(ch.userData._oe)})}});
    _hovered=null;
  }
  clearDetDims();
  if(!tt)tt=document.getElementById('tooltip');
  if(tt)tt.style.display='none';
  ren.domElement.style.cursor='grab';
}
function onMeshClick(e){
  _mouse.x=(e.clientX/innerWidth)*2-1;
  _mouse.y=-(e.clientY/innerHeight)*2+1;
  raycaster.setFromCamera(_mouse,cam);
  const hits=raycaster.intersectObjects(meshes,true);
  if(!hits.length)return;
  let obj=hits[0].object;
  while(obj&&!meshes.includes(obj))obj=obj.parent;
  if(!obj)return;
  const hide=!obj.userData._clicked;
  obj.userData._clicked=hide;
  obj.traverse(ch=>{if(ch.isMesh&&ch.material){
    const ms=Array.isArray(ch.material)?ch.material:[ch.material];
    ms.forEach(m=>{
      if(hide){
        if(ch.userData._oo===undefined)ch.userData._oo=m.opacity;
        m.transparent=true;m.opacity=.05;m.needsUpdate=true;
      }else{
        m.opacity=ch.userData._oo!==undefined?ch.userData._oo:1;m.needsUpdate=true;
      }
    })}});
  updateHiddenPanel();
}

/* ═══ HIDDEN PARTS PANEL ═══ */
function updateHiddenPanel(){
  let hpl=document.getElementById('hpl');
  if(!hpl){
    const sb=document.querySelector('.side-body');
    if(!sb)return;
    hpl=document.createElement('div');hpl.id='hpl';
    sb.insertBefore(hpl,sb.firstChild);
  }
  const hidden=meshes.filter(m=>m.userData._clicked);
  if(!hidden.length){hpl.innerHTML='';hpl.style.display='none';return}
  hpl.style.display='block';
  let h='<div class="acc open" style="border-color:#ef5350;margin-bottom:6px;box-shadow:0 2px 8px rgba(239,83,80,.12)">'
    +'<div class="acc-h" style="background:linear-gradient(135deg,#fce4ec44,#fff0f0)" onclick="togA(this)">'
    +'<div class="acc-ic" style="background:#ef535015;color:#ef5350">👁‍🗨</div>'
    +'<div class="acc-t" style="color:#ef5350">Hidden Parts ('+hidden.length+')</div>'
    +'<div class="acc-ar">▼</div></div>'
    +'<div class="acc-b" style="max-height:600px"><div class="acc-in">';
  hidden.forEach(m=>{
    const idx=meshes.indexOf(m);
    const ly=m.userData.layer;
    const nm=ly?(ly.n||ly.pk?.n||'Part'):'Component';
    const dm=ly?(ly.dim||ly.pk?.dim||''):'';const lc=ly?layerClr(ly):'#ef5350';
    h+='<div class="hpl-item" onclick="restoreMesh('+idx+')">' 
      +'<div class="hpl-eye">✕</div>'
      +'<div style="flex:1;min-width:0"><div class="hpl-name" style="border-left:2px solid '+lc+';padding-left:5px">'+nm+'</div>'
      +'<div class="hpl-dim" style="padding-left:7px">'+dm+'</div></div></div>';
  });
  h+='<div style="text-align:center;margin-top:6px;padding-top:4px;border-top:1px solid #fce4ec">'
    +'<button class="restore-btn" onclick="restoreAll()">↻ Restore All ('+hidden.length+')</button></div>'
    +'</div></div></div>';
  hpl.innerHTML=h;
}
function layerClr(ly){
  if(!ly)return'#78909c';
  const n=(ly.n||'').toLowerCase();
  if(n.includes('glass'))return'#00838f';
  if(n.includes('cell'))return'#2e7d32';
  if(n.includes('frame'))return'#78909c';
  if(n.includes('epe')||n.includes('eva')||n.includes('encap'))return'#f9a825';
  if(n.includes('back'))return'#455a64';
  if(n.includes('junction')||n.includes('jbox'))return'#d84315';
  if(n.includes('pallet'))return'#6d4c41';
  if(n.includes('box')||n.includes('corrugated'))return'#8d6e63';
  if(n.includes('strap'))return'#1565c0';
  if(n.includes('film'))return'#42a5f5';
  if(n.includes('corner'))return'#546e7a';
  if(n.includes('retainer'))return'#a1887f';
  return'#78909c';
}
function restoreMesh(idx){
  const obj=meshes[idx];if(!obj)return;
  obj.userData._clicked=false;
  obj.traverse(ch=>{if(ch.isMesh&&ch.material){
    const ms=Array.isArray(ch.material)?ch.material:[ch.material];
    ms.forEach(m=>{m.opacity=ch.userData._oo!==undefined?ch.userData._oo:1;m.needsUpdate=true})}});
  updateHiddenPanel();
}
function restoreAll(){
  meshes.forEach(obj=>{if(obj.userData._clicked){
    obj.userData._clicked=false;
    obj.traverse(ch=>{if(ch.isMesh&&ch.material){
      const ms=Array.isArray(ch.material)?ch.material:[ch.material];
      ms.forEach(m=>{m.opacity=ch.userData._oo!==undefined?ch.userData._oo:1;m.needsUpdate=true})}})}});
  updateHiddenPanel();
}

/* ═══ LABEL ANTI-OVERLAP ═══ */
function antiOverlap(){
  if(!dims.length)return;
  const pts=[];
  dims.forEach(d=>{if(!d.parent||!d.element)return;
    const v=new THREE.Vector3();d.getWorldPosition(v);v.project(cam);
    pts.push({el:d.element,sx:(v.x*.5+.5)*innerWidth,sy:(-v.y*.5+.5)*innerHeight,z:v.z})});
  pts.sort((a,b)=>a.sy-b.sy);
  for(let i=0;i<pts.length;i++){
    const p=pts[i];
    if(p.z>1){p.el.style.opacity='0';p.el.style.transition='opacity .25s';continue}
    let blocked=false;
    for(let j=0;j<i;j++){
      if(parseFloat(pts[j].el.style.opacity||1)<.3)continue;
      if(Math.abs(p.sx-pts[j].sx)<160&&Math.abs(p.sy-pts[j].sy)<24){blocked=true;break}}
    p.el.style.opacity=blocked?'.08':'1';p.el.style.transition='opacity .25s';
  }
}

/* ═══ LOOP ═══ */
function loop(){requestAnimationFrame(loop);ctrl.update();ren.render(scene,cam);css2.render(scene,cam);antiOverlap()}
init();
